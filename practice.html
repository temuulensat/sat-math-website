<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Full Practice Test • Temuulen SAT Math</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  /* Quiz-specific styling that matches your theme */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .smallhint{font-size:13px;color:#666;}
  .results{display:none;margin-top:14px;padding:12px;background:#f1f3f4;border-radius:10px;border:1px solid rgba(0,0,0,0.08);}
  .q{margin-top:12px;padding:14px;border-radius:12px;border:1px solid rgba(0,0,0,0.08);background:#fff;}
  .q p{margin:0 0 10px;line-height:1.55;}
  .choice{display:block;padding:10px;margin-top:8px;background:#f4f6f9;border-radius:10px;border:1px solid rgba(0,0,0,0.06);cursor:pointer;}
  .choice:hover{border-color:rgba(26,115,232,0.35);}
  .choice input{margin-right:8px;}
  .correct{background:rgba(0,160,90,0.10)!important;border-color:rgba(0,160,90,0.45)!important;}
  .wrong{background:rgba(220,20,60,0.10)!important;border-color:rgba(220,20,60,0.45)!important;}
  .explain{display:none;margin-top:10px;font-size:14px;background:#fff;padding:12px;border-radius:10px;border:1px solid rgba(0,0,0,0.08);color:#333;line-height:1.55;}
</style>
</head>

<body>
<div class="container">

  <!-- NAV -->
  <div class="nav">
    <div class="brand" onclick="location.href='index.html'">Temuulen SAT Math</div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="topics/algebra.html">Algebra</a>
      <a href="topics/data.html">Data</a>
      <a href="topics/advanced.html">Advanced</a>
      <a href="topics/geometry.html">Geometry</a>
      <a href="practice.html">Practice Test</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1 style="margin:0 0 10px;font-size:34px;line-height:1.15;">Full Practice Test (20 Questions)</h1>
    <p style="margin:0;color:#333;line-height:1.6;">
      Answer all questions, then submit to see your score + explanations.
    </p>
  </div>

  <div class="section" id="quiz">
    <div class="card">
      <div class="controls">
        <button class="btn" onclick="gradeQuiz()">Submit & Score</button>
        <button class="btn secondary" onclick="resetQuiz()">Reset</button>
        <span class="smallhint">Tip: use this like a real test — no guessing until you try.</span>
      </div>

      <div class="results" id="resultsBox">
        <p id="warningText" style="color:#b00020;font-weight:900;margin:0 0 8px;"></p>
        <p id="totalScore" style="font-weight:900;margin:0 0 8px;"></p>
        <p id="breakdown" style="margin:0;"></p>
      </div>
    </div>

    <div id="questions"></div>
  </div>

  <div style="text-align:center;margin:22px 0 8px;color:#666;font-size:14px;">
    © <span id="year"></span> Temuulen SAT Math
  </div>
</div>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();

  // 20 questions (4 topics mixed)
  const questionData = [
    // Algebra (1-5)
    {topic:"algebra", q:"Solve: 2x + 6 = 14", a:"B", choices:["2","4","5","6"], exp:"2x=8 → x=4."},
    {topic:"algebra", q:"Solve: 3(x − 1) = 9", a:"C", choices:["1","2","4","6"], exp:"3x−3=9 → 3x=12 → x=4."},
    {topic:"algebra", q:"If y = 2x + 3, what is y when x = 5?", a:"D", choices:["10","11","12","13"], exp:"y=2(5)+3=13."},
    {topic:"algebra", q:"Solve: 5x − 10 = 0", a:"B", choices:["1","2","5","10"], exp:"5x=10 → x=2."},
    {topic:"algebra", q:"If x/3 = 7, what is x?", a:"C", choices:["14","18","21","24"], exp:"Multiply both sides by 3 → x=21."},

    // Data (6-10)
    {topic:"data", q:"Percent increase from 40 to 50?", a:"A", choices:["25%","20%","10%","30%"], exp:"Increase=10. Percent=10/40=25%."},
    {topic:"data", q:"Mean of 5 numbers is 8. What is their sum?", a:"D", choices:["13","20","35","40"], exp:"Sum=8×5=40."},
    {topic:"data", q:"A bag has 3 red, 5 blue, 2 green. Probability of blue?", a:"B", choices:["3/10","1/2","5/10","2/5"], exp:"Total=10. Blue=5 → 5/10=1/2."},
    {topic:"data", q:"Speed for 150 miles in 2.5 hours?", a:"B", choices:["50","60","65","75"], exp:"150/2.5=60 mph."},
    {topic:"data", q:"Ratio 2:3. If first part is 8, second part is:", a:"A", choices:["12","10","6","4"], exp:"Scale factor=4 → second=3×4=12."},

    // Advanced (11-15)
    {topic:"advanced", q:"If x² = 64 and x is positive, x =", a:"C", choices:["6","7","8","16"], exp:"Positive √64 = 8."},
    {topic:"advanced", q:"(x − 2)(x + 2) = 0. Solutions are:", a:"B", choices:["2","2 and −2","4","−4"], exp:"x−2=0 or x+2=0 → x=2 or −2."},
    {topic:"advanced", q:"If 2^x = 16, x =", a:"C", choices:["2","3","4","5"], exp:"2^4=16 → x=4."},
    {topic:"advanced", q:"√81 =", a:"A", choices:["9","8","7","6"], exp:"√81=9."},
    {topic:"advanced", q:"x² + x − 6 = 0. Solutions are:", a:"D", choices:["1","2","−2","2 and −3"], exp:"(x+3)(x−2)=0 → x=2 or −3."},

    // Geometry (16-20)
    {topic:"geo", q:"Circumference C = 2πr. If r = 3, C =", a:"C", choices:["3π","4π","6π","9π"], exp:"C=2π(3)=6π."},
    {topic:"geo", q:"Right triangle legs 3 and 4. Hypotenuse =", a:"B", choices:["4","5","6","7"], exp:"√(3²+4²)=√25=5."},
    {topic:"geo", q:"Slope between (1,2) and (5,10) is:", a:"D", choices:["1","3","4","2"], exp:"(10−2)/(5−1)=8/4=2."},
    {topic:"geo", q:"Triangle angles 50° and 60°. Third angle =", a:"A", choices:["70°","80°","90°","100°"], exp:"180−(50+60)=70."},
    {topic:"geo", q:"Rectangle perimeter 20, length 6. Width =", a:"C", choices:["2","3","4","5"], exp:"2(6+W)=20 → 6+W=10 → W=4."}
  ];

  const topics = {
    algebra: {label:"Algebra"},
    data: {label:"Data"},
    advanced: {label:"Advanced"},
    geo: {label:"Geometry"}
  };

  // Build the quiz
  const questionsDiv = document.getElementById("questions");
  questionData.forEach((item, idx) => {
    const qNum = idx + 1;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="q" data-topic="${item.topic}" data-answer="${item.a}">
        <p><strong>${qNum}.</strong> ${item.q}</p>
        ${item.choices.map((text, i) => {
          const letter = String.fromCharCode(65 + i);
          return `
            <label class="choice">
              <input type="radio" name="q${qNum}" value="${letter}"> ${letter}) ${text}
            </label>
          `;
        }).join("")}
        <div class="explain">Explanation: ${item.exp}</div>
      </div>
    `;
    questionsDiv.appendChild(card);
  });

  function gradeQuiz(){
    const questions = document.querySelectorAll(".q");
    const results = document.getElementById("resultsBox");
    const warning = document.getElementById("warningText");
    const totalScore = document.getElementById("totalScore");
    const breakdown = document.getElementById("breakdown");

    // clear previous marks
    warning.textContent = "";
    document.querySelectorAll(".choice").forEach(c => c.classList.remove("correct","wrong"));
    document.querySelectorAll(".explain").forEach(e => e.style.display = "none");

    // unanswered check
    const missing = [];
    questions.forEach((q, i) => {
      if(!q.querySelector("input:checked")) missing.push(i+1);
    });

    if(missing.length){
      results.style.display = "block";
      warning.textContent = "Please answer all questions. Missing: " + missing.join(", ");
      totalScore.textContent = "";
      breakdown.textContent = "";
      return;
    }

    // scoring + topic breakdown
    let score = 0;
    const t = {
      algebra:{correct:0,total:0},
      data:{correct:0,total:0},
      advanced:{correct:0,total:0},
      geo:{correct:0,total:0}
    };

    questions.forEach((q) => {
      const correct = q.dataset.answer;
      const topic = q.dataset.topic;
      t[topic].total++;

      const selected = q.querySelector("input:checked").value;

      q.querySelectorAll(".choice").forEach(label => {
        const val = label.querySelector("input").value;
        if(val === correct) label.classList.add("correct");
        if(val === selected && val !== correct) label.classList.add("wrong");
      });

      if(selected === correct){
        score++;
        t[topic].correct++;
      }

      q.querySelector(".explain").style.display = "block";
    });

    results.style.display = "block";
    totalScore.textContent = `Total Score: ${score} / ${questions.length}`;
    breakdown.textContent =
      `By Topic: ${topics.algebra.label} ${t.algebra.correct}/${t.algebra.total} • ` +
      `${topics.data.label} ${t.data.correct}/${t.data.total} • ` +
      `${topics.advanced.label} ${t.advanced.correct}/${t.advanced.total} • ` +
      `${topics.geo.label} ${t.geo.correct}/${t.geo.total}`;
    results.scrollIntoView({behavior:"smooth", block:"center"});
  }

  function resetQuiz(){
    document.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
    document.querySelectorAll(".choice").forEach(c => c.classList.remove("correct","wrong"));
    document.querySelectorAll(".explain").forEach(e => e.style.display = "none");
    document.getElementById("resultsBox").style.display = "none";
  }
</script>
</body>
</html>
